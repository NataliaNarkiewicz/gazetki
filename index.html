<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Produkty z gazetki</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 300px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .price {
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Produkty z gazetki</h1>

<input type="text" placeholder="Szukaj..." oninput="search(this.value)">

<div id="app">Ładowanie...</div>

<script>
const SUPABASE_URL = "https://xtucjfzxwfxnlowjwxgk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0dWNqZnp4d2Z4bmxvd2p3eGdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDg0NzIsImV4cCI6MjA5MTM4NDQ3Mn0.CpIjKKhbXrNAnEefZYU-4T1jUWI7whpygeiXZggNvQs";

let produkty = [];

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/produkty?select=*`, {
      method: "GET",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    if (!res.ok) {
      throw new Error("HTTP error: " + res.status);
    }

    produkty = await res.json();
    render(produkty);

  } catch (err) {
    document.getElementById("app").innerHTML = "❌ Błąd pobierania danych";
    console.error(err);
  }
}

function render(data) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (data.length === 0) {
    app.innerHTML = "Brak produktów";
    return;
  }

  data.forEach(p => {
    app.innerHTML += `
      <div class="card">
        <div><b>${p.nazwa}</b></div>
        <div class="price">${p.cena} zł</div>
        <div>Sklep: ${p.sklep}</div>
        <div>Promocja: ${p.promocja || "-"}</div>
        <div>${p.opis || ""}</div>
      </div>
    `;
  });
}

function search(text) {
  const filtered = produkty.filter(p =>
    p.nazwa.toLowerCase().includes(text.toLowerCase())
  );
  render(filtered);
}

loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Arrows</title>

<style>
/* ===== CAŁA STRONA ===== */
body {
  margin: 0;
  font-family: Arial;

  /* jasne tło */
  background: #f2f2f2;

  text-align: center;
}

/* ===== POLE GRY NA CAŁY EKRAN ===== */
#game {
  width: 100vw;   /* pełna szerokość ekranu */
  height: 80vh;   /* prawie cały ekran */

  position: relative;
  overflow: hidden;

  border-top: 2px solid #aaa;
  border-bottom: 2px solid #aaa;
}

/* ===== STRZAŁKI ===== */
.arrow {
  position: absolute;
  font-size: 40px;

  color: black; /* ciemne strzałki na jasnym tle */
  top: 0px;
}

/* ===== WYNIK ===== */
#score {
  font-size: 22px;
}
</style>
</head>

<body>

<h1>Arrows</h1>

<div id="game"></div>

<p id="score">Score: 0</p>

<script>

// ===== ELEMENTY =====
const game = document.getElementById("game");
const scoreText = document.getElementById("score");

// ===== ZMIENNE =====
let score = 0;
let arrows = [];

// klawisze
const keys = ["ArrowLeft", "ArrowUp", "ArrowDown", "ArrowRight"];
const symbols = ["←", "↑", "↓", "→"];

// ===== MAPA =====
const chart = [
  { time: 1000, lane: 0 },
  { time: 1500, lane: 1 },
  { time: 2000, lane: 2 },
  { time: 2500, lane: 3 },
  { time: 3000, lane: 1 },
];

let startTime = Date.now();

// ===== STRZAŁKA =====
function spawnArrow(lane) {

  const arrow = document.createElement("div");
  arrow.className = "arrow";
  arrow.innerText = symbols[lane];

  // szerokość ekranu → dzielimy na 4 części
  arrow.style.left = (lane * window.innerWidth / 4 + window.innerWidth / 8) + "px";

  arrow.style.top = "0px";

  game.appendChild(arrow);

  arrows.push({
    element: arrow,
    y: 0,
    lane: lane
  });
}

// ===== SPAWN Z CZASU =====
function spawnFromChart() {
  let time = Date.now() - startTime;

  chart.forEach(note => {
    if (!note.spawned && time >= note.time) {
      spawnArrow(note.lane);
      note.spawned = true;
    }
  });
}

// ===== RUCH =====
function update() {
  arrows.forEach(a => {
    a.y += 3;
    a.element.style.top = a.y + "px";
  });
}

// ===== TRAFIENIE =====
function checkHit(key) {
  const lane = keys.indexOf(key);

  arrows.forEach((a, i) => {
    if (a.lane === lane && a.y > window.innerHeight * 0.6) {
      score += 10;
      scoreText.innerText = "Score: " + score;

      game.removeChild(a.element);
      arrows.splice(i, 1);
    }
  });
}

// ===== KLAWIATURA =====
document.addEventListener("keydown", e => {
  checkHit(e.key);
});

// ===== LOOP =====
setInterval(update, 16);
setInterval(spawnFromChart, 16);

</script>

</body>
</html>

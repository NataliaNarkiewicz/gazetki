<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gazetka + lokalizacja</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 15px;
  background: #111827;
  position: sticky;
  top: 0;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1f2937;
  padding: 12px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h2>🛒 Gazetka + Najbliższe sklepy</h2>

  <div class="controls">
    <input type="text" placeholder="Szukaj..." oninput="search(this.value)">
    <button onclick="sortPrice()">⬆ Cena</button>
    <button onclick="sortDistance()">📍 Najbliższe</button>
  </div>
</header>

<div id="app" class="grid">Ładowanie...</div>

<script>
const SUPABASE_URL = "https://xtucjfzxwfxnlowjwxgk.supabase.co";
const SUPABASE_KEY = "TWÓJ_KEY";

let produkty = [];
let userLat = null;
let userLng = null;

// 📍 GPS użytkownika
navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
});

function distance(lat1, lon1, lat2, lon2) {
  return Math.sqrt(
    Math.pow(lat1 - lat2, 2) + Math.pow(lon1 - lon2, 2)
  );
}

async function loadData() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/produkty?select=*", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  produkty = await res.json();
  render(produkty);
}

function render(data) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(p => {
    let dist = "";

    if (userLat && p.latitude) {
      dist = `📍 ${distance(userLat, userLng, p.latitude, p.longitude).toFixed(3)}`;
    }

    app.innerHTML += `
      <div class="card">
        <b>${p.nazwa}</b><br>
        💰 ${p.cena} zł<br>
        🏪 ${p.sklep}<br>
        ${p.promocja || ""}<br>
        ${p.adres || ""}<br>
        ${dist}
      </div>
    `;
  });
}

// 🔍 SEARCH
function search(text) {
  render(produkty.filter(p =>
    p.nazwa.toLowerCase().includes(text.toLowerCase())
  ));
}

// 💰 SORT CENA
function sortPrice() {
  produkty.sort((a,b) => a.cena - b.cena);
  render(produkty);
}

// 📍 SORT NAJBLISZE
function sortDistance() {
  if (!userLat) return alert("Brak lokalizacji");

  produkty.sort((a,b) =>
    distance(userLat, userLng, a.latitude, a.longitude) -
    distance(userLat, userLng, b.latitude, b.longitude)
  );

  render(produkty);
}

loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gazetka + sklepy w pobliżu</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  background: #111827;
  position: sticky;
  top: 0;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1f2937;
  padding: 12px;
  border-radius: 10px;
}

.section {
  padding: 10px 15px;
  font-weight: bold;
  color: #38bdf8;
}
</style>
</head>

<body>

<header>
  <h2>🛒 Gazetka + Sklepy w pobliżu</h2>

  <div class="controls">
    <input type="text" placeholder="Szukaj produktów..." oninput="search(this.value)">
    <button onclick="sortPrice()">⬆ Cena</button>
    <button onclick="loadShops()">📍 Sklepy</button>
  </div>
</header>

<div class="section">PRODUKTY</div>
<div id="products" class="grid"></div>

<div class="section">SKLEPY W POBLIŻU</div>
<div id="shops" class="grid"></div>

<script>
const SUPABASE_URL = "https://xtucjfzxwfxnlowjwxgk.supabase.co";
const SUPABASE_KEY = "TWÓJ_SUPABASE_KEY";

let produkty = [];
let userLat = null;
let userLng = null;


// ================= GPS (POPRAWIONE) =================

navigator.geolocation.getCurrentPosition(
  pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    loadProducts();
    loadShops();
  },
  err => {
    alert("Brak lokalizacji — włącz GPS");
    loadProducts();
  }
);


// ================= SUPABASE =================

async function loadProducts() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/produkty?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  produkty = await res.json();
  renderProducts(produkty);
}

function renderProducts(data) {
  const box = document.getElementById("products");
  box.innerHTML = "";

  data.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <b>${p.nazwa}</b><br>
        💰 ${p.cena} zł<br>
        🏪 ${p.sklep}<br>
        ${p.promocja || ""}
      </div>
    `;
  });
}


// ================= SEARCH =================

function search(text) {
  renderProducts(
    produkty.filter(p =>
      p.nazwa.toLowerCase().includes(text.toLowerCase())
    )
  );
}


// ================= SORT =================

function sortPrice() {
  produkty.sort((a,b) => a.cena - b.cena);
  renderProducts(produkty);
}


// ================= OPENSTREETMAP =================

async function loadShops() {
  if (!userLat) {
    alert("Brak GPS");
    return;
  }

  const query = `
  [out:json];
  (
    node["shop"](around:5000,${userLat},${userLng});
    node["amenity"="supermarket"](around:5000,${userLat},${userLng});
    node["name"~"Lidl|Biedronka|Livio|Dino|Aldi", i](around:5000,${userLat},${userLng});
  );
  out center;
  `;

  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  });

  const data = await res.json();

  renderShops(data.elements);
}

function renderShops(shops) {
  const box = document.getElementById("shops");
  box.innerHTML = "";

  if (!shops.length) {
    box.innerHTML = "Brak sklepów w pobliżu";
    return;
  }

  shops.forEach(s => {
    box.innerHTML += `
      <div class="card">
        🏪 ${s.tags?.name || "Sklep"}<br>
        📍 ${Number(s.lat).toFixed(4)}, ${Number(s.lon).toFixed(4)}<br>
        🛒 ${s.tags?.shop || s.tags?.amenity || ""}
      </div>
    `;
  });
}
</script>

</body>
</html>
